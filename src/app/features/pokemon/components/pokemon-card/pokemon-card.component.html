<div class="bg-white rounded-xl shadow-md p-4 cursor-pointer transition-all duration-300 ease-in-out hover:shadow-xl hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 flex flex-col items-center"
    role="button" tabindex="0" (click)="onClick()" (keydown)="onKeyDown($event)"
    [attr.aria-label]="'View details for ' + pokemon.name">

    <!-- Pokemon Image -->
    <div class="w-full flex justify-center items-center mb-3 h-[150px]">
        <img [src]="pokemon.imageUrl" [alt]="pokemon.name + ' - #' + pokemon.number"
            class="max-w-full max-h-full object-contain">
    </div>

    <!-- Pokemon Number -->
    <div class="text-sm font-medium text-gray-500 mb-1">#{{ pokemon.number }}</div>

    <!-- Pokemon Name -->
    <h3 class="text-xl font-bold text-gray-900 mb-2 text-center">{{ pokemon.name }}</h3>

    <!-- Pokemon Types -->
    <div class="flex gap-2 mb-3 flex-wrap justify-center">
        @for (type of pokemon.types; track $index) {
        <span [class]="'px-3 py-1 rounded-full text-xs font-semibold text-white ' + getTypeColorClass(type)">
            {{ type }}
        </span>
        }
    </div>

    <!-- Pokemon Stats -->
    <div class="w-full flex justify-around text-sm text-gray-700">
        <div class="flex flex-col items-center">
            <span class="text-gray-500 text-xs">Weight:</span>
            <span class="font-medium">{{ pokemon.weight / 10 }} kg</span>
        </div>
        <div class="flex flex-col items-center">
            <span class="text-gray-500 text-xs">Height:</span>
            <span class="font-medium">{{ pokemon.height / 10 }} m</span>
        </div>
    </div>
</div>
