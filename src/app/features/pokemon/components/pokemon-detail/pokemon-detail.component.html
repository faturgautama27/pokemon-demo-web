<p-dialog [(visible)]="visible" [modal]="true" [closable]="false" [draggable]="false" [resizable]="false"
    [dismissableMask]="true" (onHide)="onHide()" [styleClass]="'pokemon-detail-dialog'"
    [contentStyleClass]="'pokemon-detail-content'" role="dialog" [attr.aria-modal]="true"
    [attr.aria-labelledby]="'pokemon-detail-title'">
    <ng-template pTemplate="header" *ngIf="pokemon">
        <div class="flex items-center justify-between w-full" id="pokemon-detail-title">
            <div class="flex items-center gap-3">
                <span class="text-sm font-medium text-gray-500">#{{ pokemon.number }}</span>
                <h2 class="text-2xl font-bold text-gray-900">{{ pokemon.name }}</h2>
            </div>
            <button type="button" class="close-button" (click)="onClose()" (keydown.enter)="onClose()"
                (keydown.space)="onClose()" aria-label="Close dialog">
                <lucide-angular [img]="X" [size]="20"></lucide-angular>
            </button>
        </div>
    </ng-template>

    <div *ngIf="pokemon" class="pokemon-detail-body">
        <!-- Pokemon Image -->
        <div class="flex justify-center mb-6">
            <img [src]="pokemon.imageUrl" [alt]="pokemon.name" class="w-48 h-48 object-contain" />
        </div>

        <!-- Basic Info Section -->
        <div class="basic-info-section mb-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-3">Basic Information</h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <span class="text-sm text-gray-500">Type</span>
                    <div class="flex gap-2 mt-1">
                        <span *ngFor="let type of pokemon.types"
                            [class]="getTypeColorClass(type) + ' text-xs font-semibold text-white px-3 py-1 rounded-full'">
                            {{ type }}
                        </span>
                    </div>
                </div>
                <div>
                    <span class="text-sm text-gray-500">Weight</span>
                    <p class="text-base font-medium text-gray-900 mt-1">{{ pokemon.weight / 10 }} kg</p>
                </div>
                <div>
                    <span class="text-sm text-gray-500">Height</span>
                    <p class="text-base font-medium text-gray-900 mt-1">{{ pokemon.height / 10 }} m</p>
                </div>
            </div>
        </div>

        <!-- Abilities Section -->
        <div class="abilities-section mb-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-3">Abilities</h3>
            <div class="flex flex-wrap gap-2">
                <span *ngFor="let ability of pokemon.abilities" class="ability-badge"
                    [class.hidden-ability]="ability.isHidden">
                    {{ ability.name }}
                    <span *ngIf="ability.isHidden" class="text-xs ml-1">(Hidden)</span>
                </span>
            </div>
        </div>

        <!-- Moves Section -->
        <div class="moves-section">
            <h3 class="text-lg font-semibold text-gray-900 mb-3">Moves</h3>
            <div class="moves-container">
                <div class="move-item" *ngFor="let move of pokemon.moves">
                    <span class="move-name">{{ move.name }}</span>
                    <span class="move-method">{{ move.learnMethod }}</span>
                </div>
            </div>
        </div>
    </div>
</p-dialog>
